<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;
  --border:#d4c4a8;--card:#fffdf7;--verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:108px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  font-size:20px;line-height:1.85;
  -webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none;}
#top{position:absolute;top:0;left:0;width:1px;height:1px;overflow:hidden;}

/* ---------- 側欄 ---------- */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;background:var(--sbBg);
  color:var(--sbText);z-index:100;display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-head{position:sticky;top:0;width:100%;background:var(--sbBg);z-index:6;
  padding:14px 6px 10px;border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand{display:block;text-align:center;text-decoration:none;cursor:pointer;line-height:1.5;}
.sb-brand .l1{display:block;font-family:"Noto Sans TC",sans-serif;font-size:12px;letter-spacing:1.5px;color:var(--gold);opacity:.82;}
.sb-brand .l2{display:block;font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-quick{display:flex;flex-direction:column;align-items:center;gap:5px;margin-top:9px;}
.sb-qbtn{display:block;font-family:"Noto Sans TC",sans-serif;font-size:11.5px;letter-spacing:1px;
  color:var(--goldL);text-decoration:none;border:1px solid rgba(184,134,11,.5);
  border-radius:11px;padding:2px 12px;background:rgba(184,134,11,.12);transition:background .2s;}
.sb-qbtn:hover{background:rgba(184,134,11,.28);}
.sb-now{margin-top:11px;padding:0 4px;width:100%;}
.sb-now-lbl{font-family:"Noto Sans TC",sans-serif;font-size:10px;letter-spacing:2px;color:var(--gold);opacity:.7;text-align:center;}
.sb-now-name{font-family:"Noto Sans TC",sans-serif;font-size:11.5px;color:var(--sbText);text-align:center;line-height:1.4;margin-top:3px;min-height:30px;}
.sb-now-bar{height:3px;background:rgba(212,196,168,.18);border-radius:2px;margin-top:5px;overflow:hidden;}
.sb-now-fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--goldL));transition:width .25s;}
.sb-nav{display:flex;flex-direction:column;gap:3px;width:100%;align-items:center;margin-top:8px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;
  color:var(--sbText);padding:4px 3px;width:92%;border-radius:9px;transition:background .2s;}
.sb-item:hover{background:rgba(184,134,11,.14);}
.sb-circle{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;
  border:1.5px solid rgba(212,196,168,.4);font-family:"Noto Serif TC",serif;font-size:18px;font-weight:600;color:var(--goldL);transition:all .2s;}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:12px;letter-spacing:.3px;opacity:.86;text-align:center;line-height:1.25;}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;border-color:var(--goldL);box-shadow:0 0 12px rgba(184,134,11,.6);}
.sb-item.active .sb-label{opacity:1;color:var(--goldL);}

/* tooltip */
#sbTip{position:fixed;z-index:300;max-width:300px;background:rgba(30,26,20,.97);color:#f3ead6;
  border:1px solid rgba(184,134,11,.5);border-radius:10px;padding:11px 15px;
  font-family:"Noto Sans TC",sans-serif;box-shadow:0 6px 24px rgba(0,0,0,.4);
  opacity:0;pointer-events:none;transition:opacity .18s;}
#sbTip.show{opacity:1;}
#sbTip .tt-juan{font-size:11px;letter-spacing:1.5px;color:var(--goldL);}
#sbTip .tt-name{font-size:15px;font-weight:700;color:#fff;margin:3px 0 5px;}
#sbTip .tt-tip{font-size:13px;line-height:1.6;color:#d8ccb4;}

/* ---------- main ---------- */
.main{margin-left:var(--sbW);}
.site-hero{position:relative;background:var(--headGrad);color:#f3ead6;
  padding:78px 30px 64px;text-align:center;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:300px;font-weight:900;color:#fff;opacity:.035;
  white-space:nowrap;pointer-events:none;font-family:"Noto Serif TC",serif;}
.hero-tag{position:relative;font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:6px;color:var(--goldL);margin-bottom:14px;}
.hero-title{position:relative;font-size:58px;font-weight:900;letter-spacing:4px;margin:0 0 8px;color:#f7eed8;}
.hero-juan{position:relative;font-size:30px;font-weight:700;letter-spacing:8px;color:var(--goldL);margin-bottom:18px;}
.hero-sub{position:relative;font-size:18px;line-height:1.9;color:#d8cdb6;max-width:640px;margin:0 auto;}
.hero-range{position:relative;font-family:"Noto Sans TC",sans-serif;font-size:15px;letter-spacing:2px;color:var(--gold);margin-top:20px;
  border-top:1px solid rgba(184,134,11,.3);display:inline-block;padding-top:14px;}

/* preface */
.preface{max-width:820px;margin:50px auto 0;padding:0 32px;}
.preface-title{text-align:center;font-size:30px;font-weight:700;letter-spacing:10px;color:var(--accent);margin:0 0 6px;}
.preface-rule{width:64px;height:3px;background:var(--gold);margin:0 auto 26px;border-radius:2px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 16px;}
.preface strong{color:var(--accent-red);font-weight:700;}

/* 總目錄 */
.toc-section{max-width:1120px;margin:46px auto 10px;padding:0 28px;}
.toc-title{text-align:center;font-size:34px;font-weight:700;letter-spacing:12px;color:var(--accent);margin:0 0 6px;}
.toc-rule{width:64px;height:3px;background:var(--gold);margin:0 auto 10px;border-radius:2px;}
.toc-desc{text-align:center;font-family:"Noto Sans TC",sans-serif;font-size:16px;letter-spacing:1px;color:var(--text-muted);margin-bottom:30px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:18px;}
.toc-card{display:flex;align-items:center;gap:18px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:18px 22px;text-decoration:none;color:var(--text);
  box-shadow:0 2px 8px rgba(91,58,41,.06);transition:transform .18s,box-shadow .18s,border-color .18s;}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(91,58,41,.14);border-color:var(--gold);}
.toc-num{flex:0 0 auto;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--gold),var(--goldL));color:#1e1a14;font-size:26px;font-weight:700;font-family:"Noto Serif TC",serif;}
.toc-body{display:flex;flex-direction:column;}
.toc-name{font-size:19.5px;font-weight:700;color:var(--accent);line-height:1.5;}
.toc-sub{font-family:"Noto Sans TC",sans-serif;font-size:14px;color:var(--text-muted);line-height:1.6;margin-top:5px;}

/* 章節（品）區 */
.chapter{margin:54px 0 0;}
.ch-head{background:var(--headGrad);color:#f3ead6;padding:46px 30px 40px;text-align:center;position:relative;}
.ch-head::after{content:"";display:block;width:60px;height:2px;background:var(--gold);margin:18px auto 0;}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:16px;letter-spacing:4px;color:var(--goldL);margin-bottom:10px;}
.ch-name{font-size:38px;font-weight:900;letter-spacing:3px;margin:0;color:#f7eed8;}
.ch-sub{font-family:"Noto Sans TC",sans-serif;font-size:16px;letter-spacing:1px;color:#d8cdb6;margin-top:12px;}
.ch-body{max-width:1000px;margin:0 auto;padding:34px 26px 10px;}

/* 橋接 */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);
  border-left:5px solid var(--gold);border-radius:10px;padding:20px 26px;margin:0 0 28px;box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:32px;margin-bottom:8px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;background:var(--gold);color:#fff;
  padding:3px 13px;border-radius:12px;letter-spacing:2.2px;margin-bottom:11px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.05;font-size:18.5px;}

/* iframe */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;border:1px solid var(--border);
  border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:200px;}

.next-link{display:block;text-align:center;font-family:"Noto Sans TC",sans-serif;font-size:16px;letter-spacing:1px;
  color:var(--accent);text-decoration:none;border:1px dashed var(--gold);border-radius:30px;
  padding:13px 20px;margin:22px auto 6px;max-width:560px;background:rgba(184,134,11,.06);transition:background .2s;}
.next-link:hover{background:rgba(184,134,11,.16);}

/* 頁尾 */
.site-footer{margin-top:60px;background:var(--headGrad);color:#cbb892;text-align:center;padding:40px 24px;}
.site-footer .ft-title{font-size:18px;letter-spacing:6px;color:var(--goldL);font-weight:700;}
.site-footer p{font-family:"Noto Sans TC",sans-serif;font-size:14px;line-height:1.9;margin:8px 0 0;color:#b6a585;}

/* 進度膠囊 */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;
  background:rgba(30,26,20,.92);color:var(--gold);padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--gold),var(--goldL));width:0;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:40px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

#backTop{position:fixed;right:22px;bottom:22px;width:46px;height:46px;border-radius:50%;border:none;
  background:var(--gold);color:#1e1a14;font-size:22px;cursor:pointer;z-index:120;opacity:0;
  pointer-events:none;transition:opacity .3s;box-shadow:0 4px 14px rgba(0,0,0,.25);}
#backTop.show{opacity:1;pointer-events:auto;}
#sbToggle{display:none;}

@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  .main{margin-left:0;}
  #sbToggle{display:flex;align-items:center;justify-content:center;position:fixed;left:14px;top:14px;
    z-index:130;width:44px;height:44px;border-radius:10px;border:none;background:var(--sbBg);color:var(--goldL);font-size:22px;cursor:pointer;}
  .hero-title{font-size:42px;}.ch-name{font-size:30px;}.toc-grid{grid-template-columns:1fr;}
}

document.addEventListener('click',function(e){var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;
  if(!a)return;var h=a.getAttribute('href');if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var el=document.getElementById(h.substring(1));if(!el)return;e.preventDefault();resizeAllFrames();
  setTimeout(function(){resizeAllFrames();var r=el.getBoundingClientRect();
    window.scrollTo({top:window.scrollY+r.top-16,behavior:'smooth'});},60);},true);
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);

/* 側欄高亮 + 目前閱讀 */
var items=[].slice.call(document.querySelectorAll('.sb-item'));
var secs=items.map(function(it){return document.getElementById('chapter-'+it.getAttribute('data-ch'));});
var nowName=document.getElementById('sbNowName'),nowFill=document.getElementById('sbNowFill');
function highlight(){var idx=-1;
  for(var i=0;i<secs.length;i++){if(secs[i]&&secs[i].getBoundingClientRect().top<window.innerHeight*0.35)idx=i;}
  items.forEach(function(it,i){it.classList.toggle('active',i===idx);});
  if(idx<0){if(nowName)nowName.textContent='編者前言 · 總目錄';if(nowFill)nowFill.style.width='0';return;}
  var it=items[idx];if(nowName)nowName.textContent=(it.getAttribute('data-juan')||'')+' · '+(it.getAttribute('data-name')||'');
  var sec=secs[idx];if(sec&&nowFill){var rc=sec.getBoundingClientRect();
    var range=Math.max(1,sec.offsetHeight-window.innerHeight);
    var p=Math.max(0,Math.min(100,(-rc.top)/range*100));nowFill.style.width=p+'%';}
  var act=items[idx],sb=document.getElementById('sb');
  if(act&&sb){var r=act.getBoundingClientRect(),sr=sb.getBoundingClientRect();
    if(r.top<sr.top+90||r.bottom>sr.bottom-20)act.scrollIntoView({block:'center'});}}
window.addEventListener('scroll',highlight,{passive:true});highlight();

/* tooltip */
var tip=document.getElementById('sbTip');
items.forEach(function(it){
  it.addEventListener('mouseenter',function(){
    tip.querySelector('.tt-juan').textContent=it.getAttribute('data-juan')||'';
    tip.querySelector('.tt-name').textContent=it.getAttribute('data-name')||'';
    tip.querySelector('.tt-tip').textContent=it.getAttribute('data-tip')||'';
    var r=it.getBoundingClientRect();tip.style.left=(r.right+12)+'px';
    var y=r.top+r.height/2;tip.style.top=Math.max(60,Math.min(window.innerHeight-90,y))+'px';
    tip.style.transform='translateY(-50%)';tip.classList.add('show');});
  it.addEventListener('mouseleave',function(){tip.classList.remove('show');});});
window.addEventListener('scroll',function(){tip.classList.remove('show');},{passive:true});

/* backTop / sbToggle */
var backTop=document.getElementById('backTop');
window.addEventListener('scroll',function(){backTop.classList.toggle('show',window.scrollY>600);},{passive:true});
backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
document.getElementById('sbBrand').addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});
var sbToggle=document.getElementById('sbToggle'),sb=document.getElementById('sb');
sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});

/* 進度膠囊接近頁尾淡出 */
(function(){var cap=document.getElementById('readProgress');if(!cap)return;
  var tg=[].slice.call(document.querySelectorAll('[data-wy-notice="v2"], .site-footer'));if(!tg.length)return;
  if('IntersectionObserver'in window){var io=new IntersectionObserver(function(es){
    cap.classList.toggle('hide-near-end',es.some(function(e){return e.isIntersecting;}));
  },{rootMargin:'0px 0px -20px 0px',threshold:0.01});tg.forEach(function(t){io.observe(t);});}})();

/* 外層防複製 */
(function(){var b=function(e){e.preventDefault();return false;};
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){document.addEventListener(ev,b,true);});
document.addEventListener('keydown',function(e){var k=e.key;
if(e.ctrlKey&&'cCaAsSpPuUxX'.indexOf(k)>=0)b(e);if(k==='F12')b(e);
if(e.ctrlKey&&e.shiftKey&&'IJCK'.indexOf(k)>=0)b(e);},true);})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-27-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
