<title>大智度論 · 卷二十七 · 1-6 品彙整</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f7f3ec; --text:#2c2416; --text2:#5a4e3a; --text-muted:#6B5B4B;
  --accent:#8b5e3c; --accentL:#c4956a; --accent-red:#8B2500;
  --gold:#b8860b; --goldL:#d4a84b; --gold-light:#C9A84C;
  --border:#d4c4a8; --border-light:#EDE8E0; --card:#fffdf7;
  --verseBg:#f0e8d8; --verseBd:#c4956a;
  --sbW:76px; --sbBg:#1e1a14; --sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px; --primary:#2C1810; --primary-light:#5B3A29; --shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-user-drag:none;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar,*::-webkit-scrollbar{display:none;width:0;height:0;}
body{
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  background:var(--bg); color:var(--text); line-height:1.85; font-size:20px;
}
img{-webkit-user-drag:none;pointer-events:none;}

/* ============ 側欄 ============ */
#sb{
  position:fixed; left:0; top:0; bottom:0; width:var(--sbW);
  background:var(--sbBg); color:var(--sbText);
  z-index:100; padding:18px 0; overflow-y:auto;
  border-right:1px solid rgba(184,134,11,.2);
}
.sb-brand{
  display:block; text-align:center; color:var(--gold);
  font-family:"Noto Serif TC",serif; font-weight:700;
  font-size:14px; letter-spacing:3px; padding:6px 0 16px;
  text-decoration:none; cursor:pointer;
  border-bottom:1px solid rgba(184,134,11,.25); margin-bottom:14px;
  transition:color .25s, text-shadow .25s;
}
.sb-brand:hover{color:var(--goldL); text-shadow:0 0 12px rgba(212,168,75,.55);}
.sb-nav{display:flex; flex-direction:column; gap:10px; padding:0 8px;}
.sb-item{display:flex; flex-direction:column; align-items:center;
  text-decoration:none; color:var(--sbText);
  padding:6px 2px; border-radius:8px; transition:all .25s;}
.sb-item:hover{background:rgba(184,134,11,.12); color:#fff;}
.sb-circle{width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:rgba(212,196,168,.08); border:1px solid rgba(184,134,11,.35);
  font-family:"Noto Sans TC",sans-serif; font-size:15px; color:var(--gold);
  margin-bottom:4px; transition:all .25s;}
.sb-label{font-family:"Noto Sans TC",sans-serif; font-size:11.5px;
  text-align:center; letter-spacing:1.5px; line-height:1.25;}
.sb-item.active .sb-circle{
  background:linear-gradient(135deg,var(--gold),var(--goldL));
  color:#1e1a14; border-color:var(--goldL);
  box-shadow:0 0 18px rgba(184,134,11,.55);
}
.sb-item.active .sb-label{color:#fff;}

#sbToggle{display:none;position:fixed;top:14px;left:14px;z-index:120;
  width:44px;height:44px;border-radius:10px;border:0;
  background:var(--sbBg);color:var(--gold);font-size:20px;cursor:pointer;
  box-shadow:0 2px 10px rgba(0,0,0,.25);}

/* ============ 底部進度膠囊 ============ */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:12px;opacity:.75;letter-spacing:3px;}
/* 進度膠囊在尾頁聲明（迴向偈）出現時自動淡出，避免擋住偈文 */
.read-progress{transition:opacity .35s, transform .35s;}
.read-progress.is-end-fade{opacity:0;transform:translate(-50%,30px);pointer-events:none;}

/* ============ 主區 ============ */
.main{margin-left:var(--sbW); min-height:100vh;}

.site-hero{
  background:var(--headGrad); color:#fff;
  padding:84px 30px 70px; text-align:center; position:relative; overflow:hidden;
}
.site-hero::before{
  content:"般若"; position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%); font-size:300px; font-weight:900;
  color:rgba(212,168,75,.04); letter-spacing:30px; white-space:nowrap;
  pointer-events:none;
}
.hero-title{font-size:56px; color:var(--goldL); font-weight:700;
  letter-spacing:14px; margin-bottom:16px; position:relative; z-index:1;}
.hero-subtitle{font-size:20px; color:rgba(255,255,255,.86); letter-spacing:6px;
  margin-bottom:8px; position:relative; z-index:1;
  font-family:"Noto Sans TC",sans-serif;}
.hero-sub{font-size:18px; color:rgba(255,255,255,.72); letter-spacing:4px;
  margin-bottom:22px; position:relative; z-index:1;
  font-family:"Noto Sans TC",sans-serif;}
.hero-range{display:inline-block; font-size:17px; color:var(--goldL);
  border:1px solid rgba(212,168,75,.55); padding:8px 22px;
  border-radius:30px; letter-spacing:3px; position:relative; z-index:1;
  font-family:"Noto Sans TC",sans-serif;}

/* ============ 編者前言 ============ */
.preface{max-width:980px; margin:54px auto 18px; padding:0 30px;}
.preface-title{font-size:30px; color:var(--accent); text-align:center;
  letter-spacing:8px; margin-bottom:24px; font-weight:700;}
.preface p{font-size:19px; line-height:2.1; color:var(--text2); margin:0 0 14px;
  text-align:justify;}

/* ============ 總目錄 ============ */
.toc-section{max-width:1100px; margin:46px auto 60px; padding:40px 30px 50px;
  background:var(--card); border:1px solid var(--border); border-radius:16px;
  box-shadow:0 4px 22px rgba(91,58,41,.08);}
.toc-title{text-align:center; font-family:"Noto Serif TC",serif;
  font-size:34px; color:var(--accent); letter-spacing:14px;
  font-weight:700; margin-bottom:8px;}
.toc-desc{text-align:center; font-size:17px; color:var(--text-muted);
  letter-spacing:3px; margin-bottom:30px;}
.toc-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:14px;}
.toc-card{background:#fff; border:1px solid var(--border); border-radius:10px;
  padding:18px 20px; display:flex; align-items:center; gap:16px;
  text-decoration:none; color:inherit;
  transition:all .25s;}
.toc-card:hover{border-color:var(--gold); box-shadow:0 4px 14px rgba(184,134,11,.18);
  transform:translateY(-2px);}
.toc-num{flex:0 0 44px; height:44px; border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--goldL)); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-family:"Noto Sans TC",sans-serif; font-size:17px; font-weight:700;}
.toc-name{flex:1; line-height:1.7;}
.toc-name .toc-main{display:block; font-size:19.5px; font-weight:600;
  color:var(--accent);}
.toc-name .toc-sub{display:block; font-size:15px; color:var(--text-muted);
  margin-top:4px; letter-spacing:1px;}

/* ============ 章節 ============ */
.chapter{margin:60px 0;}
.ch-head{
  background:var(--headGrad); color:#fff;
  padding:50px 30px; text-align:center; position:relative;
  border-top:3px solid var(--gold); border-bottom:3px solid var(--gold);
}
.ch-num{font-family:"Noto Sans TC",sans-serif; font-size:18px;
  color:var(--goldL); letter-spacing:6px; margin-bottom:12px;}
.ch-name{font-family:"Noto Serif TC",serif; font-size:34px;
  font-weight:700; color:#fff; letter-spacing:8px; margin-bottom:10px;}
.ch-sub{font-size:17px; color:rgba(255,255,255,.78);
  letter-spacing:3px; font-family:"Noto Sans TC",sans-serif;}

.ch-body{max-width:1080px; margin:0 auto; padding:30px 24px 6px;}

/* ============ 橋接 ============ */
.bridge{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);
  border-left:5px solid var(--gold);
  border-radius:10px;
  padding:18px 24px; margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);
}
.bridge-outro{
  border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px; margin-bottom:14px;
}
.bridge-label{
  display:inline-block;
  font-family:"Noto Sans TC",sans-serif; font-size:12.5px;
  background:var(--gold); color:#fff;
  padding:3px 12px; border-radius:12px;
  letter-spacing:2.2px; margin-bottom:10px;
}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0; color:var(--text2); line-height:2.1; font-size:18.5px;}

/* ============ iframe ============ */
.ch-frame{
  display:block; width:100%; border:0;
  background:#fffdf7;
  border:1px solid var(--border);
  border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);
  margin:0 0 8px;
  min-height:180px;
}

.next-link{display:block; text-align:center; margin:24px auto 0;
  padding:14px 24px; background:#fff; border:1px solid var(--border);
  border-radius:30px; max-width:380px;
  font-size:17px; font-family:"Noto Sans TC",sans-serif;
  color:var(--accent); text-decoration:none; letter-spacing:3px;
  transition:all .25s;}
.next-link:hover{background:var(--gold); color:#fff; border-color:var(--gold);
  box-shadow:0 4px 16px rgba(184,134,11,.35);}

/* ============ 回頂 ============ */
#backTop{position:fixed; right:24px; bottom:90px; z-index:110;
  width:44px; height:44px; border-radius:50%; border:0;
  background:var(--sbBg); color:var(--gold); font-size:20px; cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.3); display:none;}

/* ============ Footer ============ */
.site-footer{
  background:#1e1a14; color:#a89878;
  padding:30px; text-align:center;
  font-size:15px; letter-spacing:2px;
  font-family:"Noto Sans TC",sans-serif;
  border-top:1px solid rgba(184,134,11,.25);
}
.site-footer p{margin:0;}

/* ============ RWD ============ */
@media(max-width:900px){
  #sb{transform:translateX(-100%); transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .hero-title{font-size:42px; letter-spacing:8px;}
  .ch-name{font-size:26px; letter-spacing:4px;}
  .preface,.toc-section{padding-left:22px; padding-right:22px;}
}

/* ============ 1.2x 字級放大（外層）============ */
body{font-size:20px!important;}
.hero-title,.site-hero h1{font-size:56px!important;}
.hero-subtitle,.site-hero .hero-subtitle{font-size:20px!important;}
.hero-sub,.site-hero .hero-sub,.hero-meta{font-size:18px!important;}
.hero-range{font-size:17px!important;}
.preface p,.preface-text p{font-size:19px!important;line-height:2.1!important;}
.preface h2,.preface-title{font-size:30px!important;}
.toc-title{font-size:34px!important;}
.toc-desc{font-size:17px!important;}
.toc-name .toc-main{font-size:19.5px!important;line-height:1.7!important;}
.toc-name .toc-sub{font-size:15px!important;}
.toc-num{font-size:17px!important;}
.bridge p{font-size:18.5px!important;line-height:2.1!important;}
.bridge-label{font-size:12.5px!important;letter-spacing:2.2px!important;}
.ch-num{font-size:18px!important;}
.ch-name{font-size:34px!important;}
.ch-sub,.ch-desc,.ch-subtitle{font-size:17px!important;}
.next-link{font-size:17px!important;}
.read-progress{font-size:14px!important;padding:9px 24px!important;}
.read-progress .rp-bar{width:148px!important;height:4px!important;}
.read-progress .rp-pct{font-size:13px!important;}
.read-progress .rp-label{font-size:12px!important;}
.sb-circle{font-size:15px!important;}
.sb-label{font-size:11.5px!important;}
.site-footer,.site-footer p{font-size:15px!important;}
</style>
</head>

<script id="wy-l1l5-decoder">
/* ===== L1 / L5 解碼器（必須在所有其他腳本之前執行） ===== */
(function(){
  'use strict';
  var KEY = "智度論卷二七";
  function _decode(b64){
    try{
      var raw = atob(b64);
      var kb = unescape(encodeURIComponent(KEY));
      var bytes = [];
      for(var i = 0; i < raw.length; i++){
        bytes.push(raw.charCodeAt(i) ^ kb.charCodeAt(i % kb.length));
      }
      var s = '';
      for(var j = 0; j < bytes.length; j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return ''; }
  }
  function _decodeL5(){
    var els = document.querySelectorAll('[data-wy-l5][data-c]');
    for(var i = 0; i < els.length; i++){
      var el = els[i];
      el.innerHTML = _decode(el.getAttribute('data-c'));
      el.removeAttribute('data-c');
      el.removeAttribute('data-wy-l5');
    }
  }
  function _decodeL1(){
    var ifrs = document.querySelectorAll('iframe.ch-frame[data-c][data-wy-l1]');
    for(var i = 0; i < ifrs.length; i++){
      var f = ifrs[i];
      var dec = _decode(f.getAttribute('data-c'));
      f.removeAttribute('data-c');
      f.removeAttribute('data-wy-l1');
      f.setAttribute('srcdoc', dec);
      // 為新 srcdoc 重綁 resize（setupFrame 在後面才宣告，所以延後一拍）
      (function(ff){
        setTimeout(function(){
          if(typeof window.setupFrame === 'function'){
            window.setupFrame(ff);
          }
        }, 0);
      })(f);
    }
  }
  function _start(){
    // 先解外層文字（避免閃爍空殼）
    _decodeL5();
    // 再解 iframe（觸發載入）
    _decodeL1();
  }
  if(window.__wyReady && typeof window.__wyReady.then === 'function'){
    window.__wyReady.then(_start);
  } else {
    // 沒有 __wyReady（未套 apply_full_protection）→ 直接解
    if(document.readyState === 'complete' || document.readyState === 'interactive'){
      _start();
    } else {
      document.addEventListener('DOMContentLoaded', _start);
    }
  }
})();
</script>
<script>
/* ===== 側欄高亮 + 平滑捲動 ===== */
(function(){
  var items = document.querySelectorAll('.sb-item');
  var chapters = document.querySelectorAll('section.chapter');
  function activeIdx(){
    var idx = 0;
    var th = window.innerHeight * 0.35;
    chapters.forEach(function(c,i){
      var r = c.getBoundingClientRect();
      if(r.top < th) idx = i;
    });
    return idx;
  }
  function refresh(){
    var i = activeIdx();
    items.forEach(function(a,k){a.classList.toggle('active', k===i);});
    var act = items[i];
    if(act){
      var sb = document.getElementById('sb');
      var rect = act.getBoundingClientRect();
      var sbRect = sb.getBoundingClientRect();
      if(rect.top < sbRect.top + 60 || rect.bottom > sbRect.bottom - 60){
        sb.scrollTo({top: act.offsetTop - sb.clientHeight/2 + rect.height/2, behavior:'smooth'});
      }
    }
  }
  window.addEventListener('scroll', refresh, {passive:true});
  refresh();

  var ham = document.getElementById('sbToggle');
  if(ham) ham.addEventListener('click', function(){
    document.getElementById('sb').classList.toggle('open');
  });
  items.forEach(function(a){
    a.addEventListener('click', function(){
      document.getElementById('sb').classList.remove('open');
    });
  });
  // 側欄頂端「卷二十七」回首連結：點擊後平滑捲動到頁面最頂
  var brand = document.getElementById('sbBrand');
  if(brand) brand.addEventListener('click', function(e){
    e.preventDefault();
    document.getElementById('sb').classList.remove('open');
    window.scrollTo({top:0, behavior:'smooth'});
  });
})();

/* ===== 進度膠囊 ===== */
var rpFill = document.getElementById('rpFill');
var rpPct  = document.getElementById('rpPct');
var rpCap  = document.getElementById('readProgress');
var endNotice = document.getElementById('endNotice');
function updateProgress(){
  var sh = document.documentElement.scrollHeight - window.innerHeight;
  var pct = sh > 0 ? Math.min(100, Math.max(0, window.scrollY / sh * 100)) : 0;
  if(rpFill) rpFill.style.width = pct + '%';
  if(rpPct)  rpPct.textContent  = Math.round(pct) + '%';
  // 尾頁聲明（迴向偈）一旦進入視窗下緣，淡出進度膠囊以免擋住偈文
  if(rpCap && endNotice){
    var rect = endNotice.getBoundingClientRect();
    var hide = rect.top < window.innerHeight - 40;
    rpCap.classList.toggle('is-end-fade', hide);
  }
}
window.addEventListener('scroll', updateProgress, {passive:true});
window.addEventListener('resize', updateProgress);
updateProgress();

/* ===== 回頂按鈕 ===== */
var bt = document.getElementById('backTop');
window.addEventListener('scroll', function(){
  if(!bt) return;
  bt.style.display = window.scrollY > 600 ? 'block' : 'none';
}, {passive:true});
if(bt) bt.addEventListener('click', function(){
  window.scrollTo({top:0, behavior:'smooth'});
});

/* ===== iframe 自動高度（2026/04 晚期修正版） ===== */
function resizeFrame(f){
  try{
    var d = f.contentDocument || f.contentWindow.document;
    if(!d || !d.body) return;
    d.body.style.minHeight = '0';
    d.body.style.height    = 'auto';
    if(d.documentElement){
      d.documentElement.style.minHeight = '0';
      d.documentElement.style.height    = 'auto';
    }
    var h = d.body.scrollHeight;
    if(h > 100){
      f.style.height    = h + 'px';
      f.style.minHeight = '0';
    }
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function') updateProgress();
}
function setupFrame(f){
  var tries = 0;
  function tick(){
    tries++;
    resizeFrame(f);
    if(tries < 30) setTimeout(tick, 200);
  }
  if(f.contentDocument && f.contentDocument.readyState === 'complete'){
    tick();
  } else {
    f.addEventListener('load', tick);
  }
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize', function(){
  clearTimeout(rzT);
  rzT = setTimeout(resizeAllFrames, 200);
});

/* ===== 錨點點擊防錯跳 ===== */
document.addEventListener('click', function(e){
  var a = e.target;
  while(a && a.tagName !== 'A') a = a.parentElement;
  if(!a) return;
  var h = a.getAttribute('href');
  if(!h || h.charAt(0) !== '#' || h.length < 2) return;
  var id = h.substring(1);
  var el = document.getElementById(id);
  if(!el) return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect = el.getBoundingClientRect();
    var y = window.scrollY + rect.top - 20;
    window.scrollTo({top:y, behavior:'smooth'});
  }, 60);
}, true);

/* ===== 持續輪詢確保尺寸定稿 ===== */
var _rt=0, _riv=setInterval(function(){
  _rt++; resizeAllFrames();
  if(_rt > 50) clearInterval(_riv);
}, 300);

/* ===== 防複製外層 ===== */
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev, blk, true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
})();
</script>

<style id="wy-l10-css">
.wy-l10-ph{min-height:120px;background:transparent;}
/* Safari「輸出為 PDF」對策：blur/visibilitychange 進入 panic 模式時，
   全頁套用 wy-pdf-shield 隱藏所有章節容器，僅保留警語 */
body.wy-pdf-shield main section.chapter,
body.wy-pdf-shield iframe,
body.wy-pdf-shield img,
body.wy-pdf-shield svg{visibility:hidden!important;}
body.wy-pdf-shield::before{
  content:"此頁僅供線上閱讀，禁止輸出為 PDF 或另存。";
  position:fixed;inset:0;background:#1e1a14;color:#d4a84b;
  display:flex;align-items:center;justify-content:center;
  font-family:"Noto Serif TC","Songti TC",serif;font-size:22px;letter-spacing:6px;
  z-index:99999;padding:40px;text-align:center;line-height:2;
}
</style>
<script id="wy-l10-js">
(function(){
  'use strict';
  // 等 origin/freshness 完成
  function _start(){
    setTimeout(_init, 50);  // 留時間給 L1/L5 解碼器
  }
  if(window.__wyReady && typeof window.__wyReady.then === 'function'){
    window.__wyReady.then(_start);
  } else {
    if(document.readyState === 'complete') _start();
    else window.addEventListener('load', _start);
  }

  var SECTIONS = [];   // [{el, encoded, height, decoded}]
  var io = null;
  var _panic = false;  // 進入 PDF 防護緊急模式

  function _b64Encode(str){
    return btoa(unescape(encodeURIComponent(str)));
  }
  function _b64Decode(b64){
    return decodeURIComponent(escape(atob(b64)));
  }

  function _findSections(){
    var list = document.querySelectorAll('main section.chapter');
    if(list && list.length) return Array.prototype.slice.call(list);
    list = document.querySelectorAll('section.chapter, article.chapter, [data-chapter]');
    if(list && list.length) return Array.prototype.slice.call(list);
    var main = document.querySelector('main') || document.body;
    return Array.prototype.slice.call(main.children).filter(function(c){
      return c.tagName && /^(SECTION|ARTICLE|DIV)$/i.test(c.tagName)
        && c.textContent.length > 200;
    });
  }

  function _wipe(rec){
    if(!rec.decoded) return;
    var el = rec.el;
    el.innerHTML = '<div class="wy-l10-ph" style="min-height:' + rec.height + 'px"></div>';
    rec.decoded = false;
  }
  function _decode(rec){
    if(rec.decoded) return;
    if(_panic) return;  // panic 模式禁止解碼
    try{
      rec.el.innerHTML = _b64Decode(rec.encoded);
      rec.decoded = true;
    }catch(e){}
  }
  function _wipeAll(){
    SECTIONS.forEach(_wipe);
  }
  function _decodeAll(){
    SECTIONS.forEach(_decode);
  }
  function _enterPanic(){
    _panic = true;
    document.body.classList.add('wy-pdf-shield');
    _wipeAll();
  }
  function _leavePanic(){
    _panic = false;
    document.body.classList.remove('wy-pdf-shield');
    // 恢復 IO 觀察 → 在視窗內的章節會被重新 reveal
    _rearmObservers();
  }

  function _rearmObservers(){
    if(!io) return;
    SECTIONS.forEach(function(rec){
      var ph = rec.el.querySelector('.wy-l10-ph');
      if(ph) io.observe(ph);
    });
  }

  function _init(){
    var els = _findSections();
    if(!els.length) return;
    els.forEach(function(el){
      // 等 iframe 自動高度先撐起（buddhist-text-html 的 resizeFrame 會跑）
      var h = el.offsetHeight || 240;
      var html = el.innerHTML;
      var rec = {el: el, encoded: _b64Encode(html), height: h, decoded: true};
      el.setAttribute('data-wy-l10-h', h);
      SECTIONS.push(rec);
    });

    _wipeAll();

    // IntersectionObserver lazy reveal + 視野外 re-encode
    if('IntersectionObserver' in window){
      io = new IntersectionObserver(function(entries){
        entries.forEach(function(entry){
          var ph = entry.target;
          var sec = ph.parentElement;
          if(!sec) return;
          var rec = SECTIONS.filter(function(r){return r.el === sec;})[0];
          if(!rec) return;
          if(entry.isIntersecting){
            _decode(rec);
          }
        });
      }, {rootMargin: '600px 0px'});
      _rearmObservers();
    } else {
      _decodeAll();
    }

    // ===== PDF 防護觸發器 =====
    // 只保留「真的進入列印媒體」才會觸發的兩條，零誤觸：
    //   (1) beforeprint：標準列印事件（⌘P / 列印對話框）
    //   (2) matchMedia('print').change：部分 WebKit 走這條
    //
    // 已移除（會干擾正常閱讀的觸發器）：
    //   • blur / visibilitychange（多任務、切視窗、右鍵都會誤觸）
    //   • pagehide（兩指水平滑手勢會誤觸）
    //   • mouseleave（滑鼠移到視窗邊緣即誤觸）
    //   • 200ms 輪詢（部分 Safari 會偶發 print media 假陽性）
    //
    // Safari「輸出為 PDF…」這條 screen-render 路徑改由 L1+L5 build-time
    // 編碼守住（DOM 裡根本沒有中文明文，PDF 抓到的就是空殼）。

    window.addEventListener('beforeprint', _enterPanic);
    window.addEventListener('afterprint',  _leavePanic);
    if(window.matchMedia){
      var mql = window.matchMedia('print');
      var onChange = function(e){ if(e.matches) _enterPanic(); else _leavePanic(); };
      if(mql.addEventListener) mql.addEventListener('change', onChange);
      else if(mql.addListener) mql.addListener(onChange);
    }

    // hashchange：錨點對應章節立即解碼
    window.addEventListener('hashchange', function(){
      var id = (location.hash || '').replace('#','');
      if(!id) return;
      var t = document.getElementById(id);
      if(!t) return;
      SECTIONS.forEach(function(rec){
        if(rec.el === t || rec.el.contains(t)){
          _decode(rec);
          setTimeout(function(){
            var t2 = document.getElementById(id);
            if(t2) t2.scrollIntoView({behavior:'smooth'});
          }, 30);
        }
      });
    });

    if(location.hash && location.hash.length > 1){
      window.dispatchEvent(new Event('hashchange'));
    }

    // 暴露除錯介面（生產環境可移除）
    window.__wyL10 = {
      sections: SECTIONS,
      enterPanic: _enterPanic,
      leavePanic: _leavePanic
    };
  }
})();
</script>
